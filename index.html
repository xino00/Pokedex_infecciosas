<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PROADEX · Atlas visual de antimicrobianos</title>
  <meta name="description" content="Atlas visual React de espectro antimicrobiano, gramnegativos resistentes y trampas PROA para guardia y estudio." />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <style>
    :root{
      color-scheme: light;
      --bg:#f5f7fb;
      --panel:#ffffff;
      --panel-2:#f9fbff;
      --ink:#172033;
      --muted:#667085;
      --muted-2:#8a95a8;
      --line:#dfe6f3;
      --line-strong:#cbd6e8;
      --brand:#2757d8;
      --brand-2:#123fae;
      --violet:#7c3aed;
      --teal:#0f766e;
      --green:#17803d;
      --amber:#b7791f;
      --red:#c03535;
      --blue:#2463eb;
      --sky:#0ea5e9;
      --shadow:0 24px 60px rgba(26,39,70,.11);
      --shadow-soft:0 12px 30px rgba(26,39,70,.08);
      --radius:24px;
      --radius-sm:16px;
      --mono:"SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    [data-theme="dark"]{
      color-scheme: dark;
      --bg:#0b1020;
      --panel:#11182a;
      --panel-2:#0d1426;
      --ink:#eef4ff;
      --muted:#a8b3c7;
      --muted-2:#7f8ca3;
      --line:#24304a;
      --line-strong:#35415c;
      --brand:#86a7ff;
      --brand-2:#b7c7ff;
      --violet:#a78bfa;
      --teal:#5eead4;
      --green:#70e28f;
      --amber:#f6c453;
      --red:#ff7b7b;
      --blue:#8bb0ff;
      --sky:#67e8f9;
      --shadow:0 24px 60px rgba(0,0,0,.42);
      --shadow-soft:0 12px 30px rgba(0,0,0,.26);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;background:
      radial-gradient(circle at 4% 0%, rgba(39,87,216,.14), transparent 26rem),
      radial-gradient(circle at 85% 8%, rgba(20,184,166,.11), transparent 24rem),
      radial-gradient(circle at 70% 90%, rgba(124,58,237,.10), transparent 27rem),
      var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5}
    button,input,select{font:inherit}
    a{color:inherit}
    .app-shell{display:grid;grid-template-columns:280px minmax(0,1fr);min-height:100vh}
    .sidebar{position:sticky;top:0;height:100vh;padding:22px 18px;background:linear-gradient(180deg,rgba(255,255,255,.85),rgba(255,255,255,.55));border-right:1px solid var(--line);backdrop-filter:blur(18px);overflow:auto;z-index:20}
    [data-theme="dark"] .sidebar{background:linear-gradient(180deg,rgba(17,24,42,.82),rgba(17,24,42,.55))}
    .brand{display:flex;gap:12px;align-items:center;margin-bottom:18px}
    .brand-mark{width:48px;height:48px;border-radius:18px;background:linear-gradient(135deg,var(--brand),var(--teal));color:white;display:grid;place-items:center;font-weight:950;letter-spacing:.04em;box-shadow:var(--shadow-soft)}
    .brand strong{display:block;font-size:1.08rem;letter-spacing:-.03em}
    .brand span:last-child{display:block;font-size:.8rem;color:var(--muted);margin-top:1px}
    .search-panel{display:grid;gap:10px;margin:18px 0}
    .search-box{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--panel);border-radius:16px;padding:11px 12px;box-shadow:0 4px 14px rgba(26,39,70,.04)}
    .search-box input{border:0;background:transparent;outline:0;width:100%;color:var(--ink)}
    .search-box input::placeholder{color:var(--muted-2)}
    .nav-list{display:grid;gap:8px;margin-top:16px}
    .nav-btn{border:1px solid transparent;background:transparent;color:var(--muted);text-align:left;border-radius:16px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.18s ease}
    .nav-btn:hover{background:var(--panel-2);color:var(--ink);border-color:var(--line)}
    .nav-btn.active{background:linear-gradient(135deg,rgba(39,87,216,.13),rgba(15,118,110,.09));color:var(--ink);border-color:rgba(39,87,216,.2);font-weight:800}
    .nav-ico{width:27px;height:27px;border-radius:10px;background:var(--panel);display:grid;place-items:center;border:1px solid var(--line);font-size:.9rem}
    .side-card{margin-top:18px;padding:14px;border:1px solid var(--line);border-radius:18px;background:var(--panel);box-shadow:var(--shadow-soft)}
    .side-card strong{font-size:.86rem;display:block;margin-bottom:7px}
    .side-card p{font-size:.78rem;color:var(--muted);margin:0}
    .theme-btn{width:100%;margin-top:10px;border:1px solid var(--line);border-radius:14px;background:var(--panel);color:var(--ink);padding:10px 12px;cursor:pointer}
    .main{min-width:0;padding:30px 36px 60px}
    .hero{display:grid;grid-template-columns:minmax(0,1.2fr) 420px;gap:22px;margin-bottom:24px;align-items:stretch}
    .hero-card{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:32px;background:
      linear-gradient(135deg,rgba(39,87,216,.12),rgba(20,184,166,.07)),var(--panel);box-shadow:var(--shadow);padding:32px}
    .hero-card::after{content:"";position:absolute;right:-70px;top:-70px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(39,87,216,.24),transparent 68%);pointer-events:none}
    .eyebrow{font-size:.77rem;text-transform:uppercase;letter-spacing:.14em;color:var(--brand);font-weight:900}
    h1{font-size:clamp(2.45rem,4.6vw,5.1rem);line-height:.92;margin:12px 0 14px;letter-spacing:-.075em;max-width:980px}
    .lead{font-size:1.08rem;color:var(--muted);max-width:72ch;margin:0}
    .hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
    .chip,.pill{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:999px;background:var(--panel);padding:7px 10px;color:var(--muted);font-size:.78rem;font-weight:750;white-space:nowrap}
    .chip strong{color:var(--ink)}
    .stat-board{display:grid;gap:12px}
    .stat-card{border:1px solid var(--line);border-radius:24px;background:var(--panel);padding:18px;box-shadow:var(--shadow-soft);position:relative;overflow:hidden}
    .stat-card b{font-size:1.85rem;letter-spacing:-.06em;display:block;line-height:1;color:var(--ink)}
    .stat-card span{font-size:.8rem;color:var(--muted)}
    .stat-card em{position:absolute;right:16px;top:15px;font-style:normal;font-size:1.35rem;opacity:.6}
    .section{display:none;animation:rise .24s ease both}
    .section.active{display:block}
    @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .section-head{display:flex;justify-content:space-between;gap:20px;align-items:end;margin:36px 0 16px}
    .section-head h2{font-size:2rem;letter-spacing:-.055em;line-height:1;margin:0}
    .section-head p{margin:7px 0 0;color:var(--muted);max-width:74ch}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
    .segmented{display:inline-flex;gap:4px;border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:4px}
    .segmented button{border:0;background:transparent;border-radius:999px;color:var(--muted);padding:8px 12px;cursor:pointer;font-size:.82rem;font-weight:800}
    .segmented button.active{background:var(--ink);color:var(--panel)}
    .grid{display:grid;gap:16px}
    .organism-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
    .antibiotic-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    .mechanism-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
    .pokedex-card{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--panel-2));border-radius:26px;padding:16px;box-shadow:var(--shadow-soft);min-height:260px;display:flex;flex-direction:column;position:relative;overflow:hidden;cursor:pointer;transition:.18s ease}
    .pokedex-card:hover{transform:translateY(-3px);border-color:var(--line-strong);box-shadow:var(--shadow)}
    .pokedex-card::before{content:"";position:absolute;inset:auto -60px -70px auto;width:180px;height:180px;border-radius:50%;opacity:.12;background:var(--accent,var(--brand))}
    .pokedex-top{display:flex;justify-content:space-between;gap:12px;align-items:start;margin-bottom:14px;position:relative}
    .dex-id{font-family:var(--mono);font-size:.75rem;color:var(--muted-2);font-weight:800}
    .type-badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;background:rgba(39,87,216,.1);color:var(--accent,var(--brand));font-size:.72rem;font-weight:900;border:1px solid rgba(39,87,216,.12)}
    .pokedex-icon{width:58px;height:58px;border-radius:22px;background:linear-gradient(135deg,rgba(255,255,255,.96),rgba(255,255,255,.34));border:1px solid var(--line);display:grid;place-items:center;font-size:1.65rem;box-shadow:0 10px 20px rgba(26,39,70,.08)}
    [data-theme="dark"] .pokedex-icon{background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.02))}
    .pokedex-card h3{font-size:1.15rem;line-height:1.05;letter-spacing:-.04em;margin:0 0 8px;position:relative}
    .pokedex-card p{font-size:.86rem;color:var(--muted);margin:0 0 12px;position:relative}
    .mini-list{display:grid;gap:6px;margin-top:auto;position:relative}
    .mini-row{display:grid;grid-template-columns:72px 1fr;gap:8px;font-size:.78rem;border-top:1px solid var(--line);padding-top:7px}
    .mini-row b{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2)}
    .mini-row span{color:var(--ink);font-weight:650}
    .accent-positive{--accent:var(--violet)}
    .accent-negative{--accent:var(--teal)}
    .accent-anaerobe{--accent:var(--amber)}
    .accent-atypical{--accent:var(--sky)}
    .accent-red{--accent:var(--red)}
    .accent-green{--accent:var(--green)}
    .accent-blue{--accent:var(--blue)}
    .accent-amber{--accent:var(--amber)}
    .detail-drawer{position:fixed;right:24px;top:24px;bottom:24px;width:min(560px,calc(100vw - 48px));z-index:50;border:1px solid var(--line);background:rgba(255,255,255,.88);backdrop-filter:blur(18px);border-radius:30px;box-shadow:var(--shadow);padding:22px;overflow:auto;animation:slideIn .22s ease both}
    [data-theme="dark"] .detail-drawer{background:rgba(17,24,42,.9)}
    @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
    .drawer-close{position:sticky;top:0;float:right;border:1px solid var(--line);border-radius:999px;background:var(--panel);color:var(--ink);width:38px;height:38px;cursor:pointer;z-index:2}
    .drawer-title{font-size:2rem;line-height:.95;letter-spacing:-.06em;margin:24px 0 8px}
    .drawer-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
    .info-block{border:1px solid var(--line);border-radius:20px;background:var(--panel);padding:14px;margin:10px 0}
    .info-block h4{margin:0 0 8px;font-size:.78rem;text-transform:uppercase;letter-spacing:.11em;color:var(--muted-2)}
    .info-block ul{margin:0;padding-left:19px;color:var(--muted)}
    .info-block li{margin:5px 0}
    .map-row{display:grid;grid-template-columns:160px minmax(0,1fr);gap:16px;margin:14px 0}
    .morph-lane{border:1px solid var(--line);border-radius:22px;background:var(--panel);padding:14px;min-height:132px}
    .morph-lane h3{margin:0 0 9px;font-size:1rem}
    .lane-items{display:flex;gap:8px;flex-wrap:wrap}
    .lane-chip{border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:var(--panel-2);font-weight:800;font-size:.8rem;color:var(--ink);cursor:pointer}
    .lane-chip:hover{border-color:var(--brand);color:var(--brand)}
    .coverage-matrix{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border:1px solid var(--line);border-radius:24px;background:var(--panel);box-shadow:var(--shadow-soft)}
    .coverage-matrix th,.coverage-matrix td{padding:10px 9px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);font-size:.82rem;text-align:center;vertical-align:middle}
    .coverage-matrix th{background:var(--panel-2);color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;position:sticky;top:0;z-index:1}
    .coverage-matrix td:first-child,.coverage-matrix th:first-child{text-align:left;min-width:210px;font-weight:900;color:var(--ink);position:sticky;left:0;background:var(--panel);z-index:2}
    .coverage-matrix th:first-child{background:var(--panel-2);z-index:3}
    .coverage-matrix tr:last-child td{border-bottom:0}
    .coverage-matrix td:last-child,.coverage-matrix th:last-child{border-right:0}
    .cov{display:inline-flex;width:28px;height:28px;border-radius:10px;align-items:center;justify-content:center;font-weight:950;border:1px solid transparent}
    .cov.yes{background:rgba(23,128,61,.14);color:var(--green);border-color:rgba(23,128,61,.2)}
    .cov.maybe{background:rgba(183,121,31,.16);color:var(--amber);border-color:rgba(183,121,31,.22)}
    .cov.no{background:rgba(192,53,53,.13);color:var(--red);border-color:rgba(192,53,53,.2)}
    .matrix-wrap{overflow:auto;border-radius:24px}
    .legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .warning-stack{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin:18px 0}
    .warning-card{border:1px solid var(--line);border-radius:24px;background:var(--panel);padding:16px;box-shadow:var(--shadow-soft);position:relative;overflow:hidden}
    .warning-card strong{display:block;font-size:1rem;margin-bottom:7px}
    .warning-card p{color:var(--muted);font-size:.84rem;margin:0}
    .warning-card .big-letter{position:absolute;right:14px;bottom:-18px;font-size:5.2rem;font-weight:1000;line-height:1;opacity:.06}
    .wizard{display:grid;grid-template-columns:360px minmax(0,1fr);gap:18px;align-items:start}
    .wizard-panel,.result-panel{border:1px solid var(--line);border-radius:28px;background:var(--panel);box-shadow:var(--shadow);padding:20px}
    .field{display:grid;gap:7px;margin-bottom:14px}
    .field label{font-size:.78rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted-2);font-weight:900}
    .field select{width:100%;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);border-radius:16px;padding:12px 13px;outline:0}
    .result-title{display:flex;align-items:start;justify-content:space-between;gap:16px;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:14px}
    .result-title h3{font-size:1.7rem;margin:0;line-height:1;letter-spacing:-.055em}
    .answer-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .answer-box{border:1px solid var(--line);border-radius:22px;background:var(--panel-2);padding:15px}
    .answer-box h4{margin:0 0 9px;font-size:.78rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted-2)}
    .answer-box ul{margin:0;padding-left:18px;color:var(--muted)}
    .answer-box li{margin:7px 0}
    .case-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
    .case-card{border:1px solid var(--line);border-radius:26px;background:var(--panel);box-shadow:var(--shadow-soft);padding:18px;display:grid;gap:12px}
    .case-card h3{font-size:1.15rem;letter-spacing:-.04em;line-height:1.05;margin:0}
    .case-card p{color:var(--muted);margin:0;font-size:.88rem}
    .case-result{border-radius:18px;padding:12px;background:linear-gradient(135deg,rgba(192,53,53,.10),rgba(183,121,31,.10));border:1px solid var(--line);font-size:.84rem;color:var(--ink)}
    details.source-details{border:1px solid var(--line);background:var(--panel);border-radius:24px;padding:14px 16px;box-shadow:var(--shadow-soft);margin:12px 0}
    details.source-details summary{cursor:pointer;font-weight:900;letter-spacing:-.02em}
    details.source-details p,details.source-details li{color:var(--muted)}
    .empty{border:1px dashed var(--line-strong);border-radius:24px;padding:28px;text-align:center;color:var(--muted);background:var(--panel)}
    .print-note{display:none}
    @media (max-width:1180px){
      .app-shell{grid-template-columns:1fr}.sidebar{height:auto;position:relative}.main{padding:22px}.hero{grid-template-columns:1fr}.organism-grid,.antibiotic-grid,.mechanism-grid,.warning-stack,.case-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.wizard{grid-template-columns:1fr}.detail-drawer{left:24px;width:auto}.coverage-matrix td:first-child,.coverage-matrix th:first-child{position:static}
    }
    @media (max-width:720px){
      .main{padding:16px}.hero-card{padding:22px;border-radius:24px}.organism-grid,.antibiotic-grid,.mechanism-grid,.warning-stack,.case-grid,.answer-grid{grid-template-columns:1fr}.section-head{display:block}.toolbar{justify-content:flex-start;margin-top:12px}.map-row{grid-template-columns:1fr}.detail-drawer{inset:10px;width:auto;border-radius:22px}.sidebar{padding:14px}.nav-list{grid-template-columns:1fr 1fr}.nav-btn{font-size:.82rem}.nav-ico{display:none}h1{font-size:3rem}.coverage-matrix th,.coverage-matrix td{font-size:.75rem;padding:8px 7px}
    }
    @media print{
      body{background:white}.sidebar,.hero-actions,.toolbar,.wizard-panel,.drawer-close{display:none!important}.app-shell{display:block}.main{padding:0}.section{display:block!important;break-inside:auto}.hero{display:block}.hero-card,.stat-card,.pokedex-card,.warning-card,.wizard-panel,.result-panel,.case-card,details.source-details{box-shadow:none;border-color:#cbd5e1}.pokedex-card{break-inside:avoid}.print-note{display:block;color:#475569;margin:12px 0}.detail-drawer{position:static;width:auto;box-shadow:none;margin:12px 0}
    }
  </style>
</head>
<body>
  <div id="root"><div style="max-width:760px;margin:40px auto;padding:24px;border:1px solid #dfe6f3;border-radius:20px;font-family:system-ui,sans-serif;background:#fff;color:#172033"><strong>PROADEX está cargando…</strong><p>Si este mensaje no desaparece, React no se ha cargado desde CDN. Abre el archivo con conexión a internet o integra React localmente en tu proyecto.</p></div></div>
  <script>
const { useMemo, useState } = React;
const SECTIONS = [
    { id: 'atlas', label: 'Atlas bacteriano', icon: '🧫' },
    { id: 'antibiotics', label: 'Pokédex antibióticos', icon: '💊' },
    { id: 'mechanisms', label: 'Mecanismos MDR', icon: '🧬' },
    { id: 'matrix', label: 'Heatmap cobertura', icon: '▦' },
    { id: 'wizard', label: 'Selector clínico', icon: '🎯' },
    { id: 'cases', label: 'Trampas de guardia', icon: '⚠️' },
    { id: 'deep', label: 'Lectura escondida', icon: '📚' }
];
const organisms = [
    { id: 'saureus', dex: 'G+001', group: 'positive', name: 'Staphylococcus aureus', short: 'S. aureus', icon: '🟣', type: 'coco en racimos', tags: ['SASM', 'SARM'], syndromes: 'IPPB, abscesos, bacteriemia, endocarditis, neumonía, osteomielitis.', cover: 'SASM: cloxacilina/cefazolina. SARM: vancomicina, daptomicina según foco, linezolid en neumonía, ceftarolina/ceftobiprol si dirigido.', gap: 'SARM no queda cubierto por beta-lactámicos habituales. Daptomicina no neumonía.', trap: 'Si el objetivo principal es SASM, no uses pip-tazo o ceftriaxona como “suficiente” si puedes usar cloxacilina/cefazolina.', search: 'staphylococcus aureus s aureus sasm sarm mrsa mssa cloxacilina cefazolina ceftarolina daptomicina vancomicina' },
    { id: 'spyogenes', dex: 'G+002', group: 'positive', name: 'Streptococcus pyogenes', short: 'S. pyogenes', icon: '🟣', type: 'coco en cadenas', tags: ['Sensible', 'Toxina'], syndromes: 'Faringoamigdalitis, erisipela/celulitis, fascitis necrotizante, shock tóxico.', cover: 'Penicilina o amoxicilina. En cuadro toxinogénico, añadir clindamicina según protocolo.', gap: 'El antibiótico no sustituye cirugía si hay necrosis.', trap: 'En fascitis necrotizante, pensar en control quirúrgico y antitoxina; no solo “cubre Strep”.', search: 'streptococcus pyogenes grupo a penicilina amoxicilina clindamicina fascitis' },
